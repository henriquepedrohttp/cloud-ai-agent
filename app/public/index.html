<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agente de IA - Cloud Computing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 800px;
            padding: 40px;
        }
        h1 { color: #333; text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        .chat-container {
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            margin-bottom: 20px;
            background: #f9f9f9;
        }
        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 15px;
            max-width: 80%;
            word-wrap: break-word;
        }
        .user-message { background: #667eea; color: white; margin-left: auto; text-align: right; }
        .ai-message { background: #e0e0e0; color: #333; }
        .input-container { display: flex; gap: 10px; }
        input[type="text"] {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }
        input[type="text"]:focus { border-color: #667eea; }
        button {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background: #5a6fd6; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .loading { display: none; text-align: center; color: #667eea; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Agente de IA</h1>
        <p class="subtitle">Powered by MiniMax M2.5 Free via OpenCode Zen</p>
        <div id="chat" class="chat-container">
            <div class="message ai-message">Olá! Sou um agente de IA rodando em Kubernetes. Como posso ajudar?</div>
        </div>
        <div class="input-container">
            <input type="text" id="userInput" placeholder="Digite sua mensagem..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button id="sendBtn" onclick="sendMessage()">Enviar</button>
        </div>
        <div id="loading" class="loading">⏳ Processando...</div>
    </div>
    <script>
        const chat = document.getElementById('chat');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const loading = document.getElementById('loading');
        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = 'message ' + (isUser ? 'user-message' : 'ai-message');
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            userInput.disabled = true;
            sendBtn.disabled = true;
            loading.style.display = 'block';
            addMessage(message, true);
            userInput.value = '';
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                const data = await response.json();
                if (data.success) {
                    addMessage(data.message, false);
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                addMessage('Erro: ' + error.message, false);
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
